    <head>

            <link rel="stylesheet" href="style.css">

    <body>
        

        <canvas id="canvas" style="z-index: -1; position: fixed;"></canvas>
        
        <div id="sidebar" style="z-index: 10;">
            <input class="sidebar1" id="strokeWidthSlider" type="range" min="1" max="100" step="1" value="20"></input><br>
            <button class="sidebar" id="defaultBrush" onclick="selectDefault()"></button>
            <button class="sidebar" id="hueBrush" onclick="selectHue()"></button>
            <button class="sidebar" id="eraser" onclick="selectEraser()"></button>
            <button class="sidebar" id="resetCanvas" onclick="selectReset()"></button>
            
        </div>
    <script src="index.js"></script>
    
    </body>
